<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro 2D Craft Block Sandbox</title>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #canvasContainer { border: 4px solid #10b981; border-radius: 16px; background: linear-gradient(to bottom, #bae6fd, #e0f2fe); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        canvas { display: block; cursor: crosshair; }
        .toolbar { margin-top: 20px; display: flex; gap: 12px; background: #1e293b; padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); }
        .tool { padding: 12px 24px; font-weight: bold; border-radius: 30px; cursor: pointer; border: none; transition: 0.2s; font-size: 0.95rem; }
        .grass { background: #22c55e; color: white; }
        .dirt { background: #b45309; color: white; }
        .stone { background: #64748b; color: white; }
        .active { transform: scale(1.1); box-shadow: 0 0 15px currentColor; outline: 2px solid white; }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 15px; color: #10b981;">2D Craft Pixel Sandbox</h2>
    <div id="canvasContainer">
        <canvas id="craftCanvas" width="720" height="440"></canvas>
    </div>
    <div class="toolbar">
        <button class="tool grass active" onclick="selectBlock('grass', this)">Grass</button>
        <button class="tool dirt" onclick="selectBlock('dirt', this)">Dirt</button>
        <button class="tool stone" onclick="selectBlock('stone', this)">Stone</button>
    </div>

    <script>
        const canvas = document.getElementById('craftCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 40;
        let selectedMaterial = 'grass';
        let worldGrid = {};

        const colors = { grass: '#15803d', dirt: '#78350f', stone: '#475569' };
        const topColors = { grass: '#22c55e', dirt: '#9a3412', stone: '#64748b' };

        function drawWorld() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let key in worldGrid) {
                const [x, y] = key.split(',').map(Number);
                
                // Block Main Body
                ctx.fillStyle = colors[worldGrid[key]];
                ctx.fillRect(x * gridSize, y * gridSize, gridSize, gridSize);
                
                // Block Top Highlight (Minecraft layer style)
                ctx.fillStyle = topColors[worldGrid[key]];
                ctx.fillRect(x * gridSize, y * gridSize, gridSize, 8);

                // Grid lines outline
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.25)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x * gridSize, y * gridSize, gridSize, gridSize);
            }
        }

        canvas.addEventListener('click', function(e) {
            const rect = canvas.getBoundingClientRect();
            const gridX = Math.floor((e.clientX - rect.left) / gridSize);
            const gridY = Math.floor((e.clientY - rect.top) / gridSize);
            const key = `${gridX},${gridY}`;

            if (worldGrid[key]) {
                delete worldGrid[key];
            } else {
                worldGrid[key] = selectedMaterial;
            }
            drawWorld();
        });

        function selectBlock(material, btn) {
            selectedMaterial = material;
            document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
        }

        // Generate Terrain Base
        for(let x=0; x < 18; x++) {
            worldGrid[`${x},7`] = 'grass';
            worldGrid[`${x},8`] = 'dirt';
            worldGrid[`${x},9`] = 'stone';
            worldGrid[`${x},10`] = 'stone';
        }
        drawWorld();
    </script>
</body>
</html>
